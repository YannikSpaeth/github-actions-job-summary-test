name: test-job-summary

on:
  push:

jobs:
  test-job-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build

      - name: Build
        run: cmake --build build
        
      - name: Run Tests
        run: ctest -V --test-dir build --output-junit build/test-results.xml

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          pip install junitparser

      - name: Prepare XML for collector
        run: |
          if [ -f build/test-results.xml ]; then
            cp build/test-results.xml gtest_results.xml
          else
            echo "No test-results.xml found"
            ls -la build || true
          fi

      - name: Run collector
        run: |
          mkdir -p build
          python3 scripts/collect_errors.py > build/collector-output.txt

      - name: Upload collector output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collector-output
          path: build/collector-output.txt

