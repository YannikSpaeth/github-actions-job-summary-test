name: test-job-summary

on:
  push:

jobs:
  test-job-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build

      - name: Build
        run: cmake --build build
        
      - name: Run Tests
        run: ctest -V --test-dir build --output-junit build/test-results.xml

