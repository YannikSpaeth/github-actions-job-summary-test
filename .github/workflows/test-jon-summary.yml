name: Build and Test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: cmake -B build
        continue-on-error: true

      - name: Build
        run: cmake --build build
        continue-on-error: true

      - name: Run Tests
        run: ctest -V --test-dir build --output-junit test-results.xml
        continue-on-error: true
        
      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ubuntu
          path: build/test-results.xml
          retention-days: 7

  report:
    needs: [build]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/collect-and-report.yml
    with:
      artifact-pattern: 'test-results-*'
      pr-number: ${{ github.event.pull_request.number }}
      sha: ${{ github.sha }}
    secrets: inherit


